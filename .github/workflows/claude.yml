name: Claude Code
on:
  # Auto-review+fix on every PR push (from humans)
  pull_request:
    types: [opened, synchronize]
  # React to Code Review bot's review — read comments, fix code
  pull_request_review:
    types: [submitted]
  # React to @claude mentions in comments
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Prevent parallel runs on the same PR
concurrency:
  group: claude-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  # Auto-fix: direct prompt mode — no trigger phrase needed
  auto-fix:
    if: |
      (github.event_name == 'pull_request' && github.actor != 'github-actions[bot]') ||
      (github.event_name == 'pull_request_review' && github.event.review.user.login != 'github-actions[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request. Read the diff, check for bugs, code quality
            issues, and best practices. If you find issues that can be fixed:
            1. Fix the code directly
            2. Commit the changes with a descriptive message
            3. Push the changes
            If the code looks good, leave a brief approving comment on the PR.
          claude_args: "--max-turns 10"

  # Interactive: triggered by @claude mentions in comments
  respond:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude"
