name: Claude Code
on:
  # Auto-review on every PR push (from humans)
  pull_request:
    types: [opened, synchronize]
  # React to Code Review bot's review
  pull_request_review:
    types: [submitted]
  # React to @claude mentions in comments
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Prevent parallel runs on the same PR
concurrency:
  group: claude-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  # Auto-fix: triggered by PR push or review (no trigger phrase needed)
  auto-fix:
    if: |
      (github.event_name == 'pull_request' && github.actor != 'github-actions[bot]') ||
      (github.event_name == 'pull_request_review' && github.event.review.user.login != 'github-actions[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: ""

  # Interactive: triggered by @claude mentions in comments
  respond:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude"
